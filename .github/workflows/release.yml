name: Build and Release NVDA Add-on

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install scons configobj

      - name: Check version and tag existence
        id: check_tag
        run: |
          VERSION=$(python -c "import buildVars; print(buildVars.addon_info['addon_version'])")
          TAG_NAME="v$VERSION"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG_NAME"; then
            echo "Tag $TAG_NAME already exists. Skipping release."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag $TAG_NAME does not exist. Proceeding with release."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and Push Tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.check_tag.outputs.tag_name }}
          git push origin ${{ steps.check_tag.outputs.tag_name }}

      - name: Compile Add-on
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          scons

      - name: Prepare Release Notes
        if: steps.check_tag.outputs.exists == 'false'
        shell: python
        run: |
          import os
          import subprocess
          import re
          if os.path.exists("whats_new.txt"):
              with open("whats_new.txt", "r", encoding="utf-8") as f:
                  content = f.read()
              lines = content.splitlines()
              extracted = []
              found = False
              version_pattern = re.compile(r"^(?:#+\s*)?Version\s+\d+(?:\.\d+)*.*:", re.IGNORECASE)
              for line in lines:
                  if version_pattern.match(line.strip()):
                      if found:
                          break
                      found = True
                      extracted.append(line)
                  elif found:
                      extracted.append(line)
              with open("release_notes.txt", "w", encoding="utf-8") as f:
                  f.write("\n".join(extracted).strip())
          else:
              result = subprocess.run(["git", "log", "-1", "--pretty=%B"], capture_output=True, text=True)
              with open("release_notes.txt", "w", encoding="utf-8") as f:
                  f.write(result.stdout.strip())

      - name: Get Add-on filename
        id: vars
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          filename=$(ls weatherChecker-*.nvda-addon)
          echo "filename=$filename" >> $GITHUB_OUTPUT

      - name: Create Release and Upload Asset
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check_tag.outputs.tag_name }}
          name: ${{ steps.check_tag.outputs.tag_name }}
          body_path: release_notes.txt
          files: ${{ steps.vars.outputs.filename }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
